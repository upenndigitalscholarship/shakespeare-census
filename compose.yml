x-common-service: &common-service
  build:
    context: .
  depends_on:
    db:
      condition: service_healthy

services:

  db:
    image: postgres:17
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
    expose:
      - "5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready",
          "--host=db",
          "--username=postgres"
        ]
      interval: 1s
      timeout: 5s
      retries: 5
    init: true
    user: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data/

  utility:
    <<: *common-service
    env_file: .env
    init: true
    volumes:
      - .:/code
    working_dir: /code

  web:
    <<: *common-service
    env_file: .env
    init: true
    volumes:
      - .:/code
    working_dir: /code
    ports:
      - "8000:8000"
    command: "/code/compose-start.sh"
    tty: true

volumes:
  postgres-data:
